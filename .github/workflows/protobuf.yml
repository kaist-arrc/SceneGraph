name: Protobuf

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    name: Generate C++ and Python bindings
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install generator dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Check generator syntax
        run: python -m py_compile tools/generate_protos.py

      - name: Generate protobuf bindings
        run: python tools/generate_protos.py

      - name: Check generated files
        run: |
          test -f generated/python/scenegraph_pb2.py
          test -f generated/cpp/scenegraph.pb.h
          test -f generated/cpp/scenegraph.pb.cc

      - name: Upload generated bindings
        uses: actions/upload-artifact@v7
        with:
          name: scenegraph-generated-bindings
          path: generated/
          retention-days: 7
