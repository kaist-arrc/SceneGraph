name: Protobuf

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    name: Generate C++, Python, and C# bindings
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Install generator dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Install protoc for C++ and C# generation
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libprotobuf-dev protobuf-compiler

      - name: Check generator syntax
        run: python -m py_compile tools/generate_protos.py

      - name: Generate protobuf bindings
        run: python tools/generate_protos.py

      - name: Check generated files
        run: |
          test -f generated/python/scenegraph_pb2.py
          test -f generated/cpp/scenegraph.pb.h
          test -f generated/cpp/scenegraph.pb.cc
          test -f generated/csharp/Scenegraph.g.cs

      - name: Run Python usage example
        run: python examples/python/build_room.py

      - name: Build C++ usage example
        run: |
          cmake -S examples/cpp -B build/examples-cpp -DGENERATED_CPP_DIR="$PWD/generated/cpp"
          cmake --build build/examples-cpp

      - name: Run C++ usage example
        run: |
          ./build/examples-cpp/build_room generated/examples
          test -f generated/examples/room_from_cpp.scenegraph.pb
          test -f generated/examples/room_from_cpp.scenegraph.pb.json

      - name: Build C# usage example
        run: dotnet build examples/csharp/SceneGraph.Example.csproj -p:GeneratedCSharpDir="$PWD/generated/csharp"

      - name: Run C# usage example
        run: |
          dotnet run --project examples/csharp/SceneGraph.Example.csproj -p:GeneratedCSharpDir="$PWD/generated/csharp" -- generated/examples
          test -f generated/examples/room_from_csharp.scenegraph.pb
          test -f generated/examples/room_from_csharp.scenegraph.pb.json

      - name: Upload generated bindings
        uses: actions/upload-artifact@v7
        with:
          name: scenegraph-generated-bindings
          path: generated/
          retention-days: 7
